<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>勝ち馬一覧</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --neon:#7dff4f; --neon-dim:#3a7d22; --neon-glow:rgba(125,255,79,0.32);
            --orange:#ff8000; --orange-glow:rgba(255,128,0,0.38);
            --gold:#c9a84c; --gold-light:#f5d878;
            --crimson:#ff2244; --crimson-dim:#7a0818;
            --purple:#8b5cf6; --purple-glow:rgba(139,92,246,0.35);
            --deep:#050708; --surface:#0b0e0b; --surface2:#111811; --surface3:#182018;
            --panel:rgba(10,14,10,0.93); --text:#d4e8cc; --text-muted:#607860;
        }
        body { font-family:'Noto Sans JP',sans-serif; background:var(--deep); color:var(--text); min-height:100vh; overflow-x:hidden; }
        body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(rgba(125,255,79,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(125,255,79,0.02) 1px,transparent 1px); background-size:44px 44px; pointer-events:none; z-index:0; }
        body::after { content:''; position:fixed; inset:0; background:radial-gradient(ellipse at 10% 15%,rgba(139,92,246,0.12) 0%,transparent 50%),radial-gradient(ellipse at 90% 85%,rgba(255,128,0,0.08) 0%,transparent 50%); pointer-events:none; z-index:0; }
        .scanlines { position:fixed; inset:0; background:repeating-linear-gradient(0deg,rgba(0,0,0,0.1) 0px,rgba(0,0,0,0.1) 1px,transparent 1px,transparent 3px); pointer-events:none; z-index:1; }
        .page-body { position:relative; z-index:2; max-width:1000px; margin:0 auto; padding:0 16px 100px; }
        .page-header { padding:32px 0 20px; border-bottom:1px solid rgba(125,255,79,0.1); margin-bottom:24px; position:relative; }
        .page-header::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,transparent,var(--crimson),var(--orange),var(--neon),var(--purple),var(--neon),var(--orange),var(--crimson),transparent); background-size:300%; animation:stripe-slide 4s linear infinite; }
        @keyframes stripe-slide { 0%{background-position:200% center} 100%{background-position:-200% center} }
        .page-title { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:5px; color:var(--neon); text-shadow:0 0 16px var(--neon-glow); }
        .page-subtitle { font-size:11px; color:var(--text-muted); letter-spacing:3px; margin-top:3px; }
        input[type=text] { background:var(--surface3); color:var(--text); border:1px solid rgba(125,255,79,0.2); border-radius:3px; padding:7px 11px; font-family:'Noto Sans JP',sans-serif; font-size:13px; outline:none; transition:border-color 0.2s,box-shadow 0.2s; }
        input[type=text]:focus { border-color:var(--neon); box-shadow:0 0 10px var(--neon-glow); }
        ::-webkit-scrollbar{width:5px} ::-webkit-scrollbar-track{background:var(--deep)} ::-webkit-scrollbar-thumb{background:var(--neon-dim);border-radius:2px} ::-webkit-scrollbar-thumb:hover{background:var(--neon)}

        .search-bar { display:flex; gap:8px; align-items:center; margin-bottom:20px; flex-wrap:wrap; }
        .search-bar input { width:220px; }
        .btn-search { padding:7px 18px; border-radius:3px; font-family:'Bebas Neue',sans-serif; font-size:13px; letter-spacing:2px; cursor:pointer; background:transparent; color:var(--neon); border:1px solid var(--neon-dim); transition:all 0.2s; }
        .btn-search:hover { border-color:var(--neon); box-shadow:0 0 12px var(--neon-glow); color:#fff; }

        .count-line { font-family:'Bebas Neue',sans-serif; font-size:13px; letter-spacing:2px; color:var(--text-muted); margin-bottom:18px; }
        .count-val { color:var(--neon); font-size:16px; }

        .horse-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(160px, 1fr)); gap:14px; }
        .horse-card { background:var(--panel); border:1px solid rgba(125,255,79,0.1); border-radius:5px; overflow:hidden; text-decoration:none; color:inherit; display:block; transition:border-color 0.2s,box-shadow 0.2s,transform 0.2s; position:relative; }
        .horse-card::before { content:''; position:absolute; top:3px; left:3px; width:8px; height:8px; border-top:1px solid var(--neon-dim); border-left:1px solid var(--neon-dim); opacity:0.4; pointer-events:none; }
        .horse-card::after { content:''; position:absolute; bottom:3px; right:3px; width:8px; height:8px; border-bottom:1px solid rgba(139,92,246,0.4); border-right:1px solid rgba(139,92,246,0.4); opacity:0.4; pointer-events:none; }
        .horse-card:hover { border-color:rgba(125,255,79,0.35); box-shadow:0 0 18px rgba(125,255,79,0.1); transform:translateY(-2px); }
        .horse-card img { width:100%; height:120px; object-fit:cover; display:block; }
        .no-img { width:100%; height:120px; background:var(--surface3); display:flex; align-items:center; justify-content:center; color:var(--text-muted); font-size:11px; letter-spacing:1px; font-family:'Bebas Neue',sans-serif; }
        .horse-card-body { padding:10px 12px; }
        .horse-card-name { font-family:'Noto Serif JP',serif; font-size:13px; font-weight:700; color:var(--text); margin-bottom:5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .horse-card-meta { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
        .meta-category { font-size:10px; color:var(--text-muted); letter-spacing:1px; }
        .win-badge { background:linear-gradient(135deg,rgba(201,168,76,0.3),rgba(245,216,120,0.15)); color:var(--gold-light); border:1px solid rgba(201,168,76,0.4); border-radius:2px; font-family:'Bebas Neue',sans-serif; font-size:10px; letter-spacing:1px; padding:1px 6px; }

        .empty-state { background:var(--panel); border:1px solid rgba(125,255,79,0.1); border-radius:5px; padding:40px 22px; text-align:center; }
        .empty-state p { color:var(--text-muted); font-size:13px; }

        @media(max-width:640px){.page-title{font-size:22px} .horse-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}}
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div th:replace="fragments/navbar :: navbar"></div>

    <div class="page-body">
        <div class="page-header">
            <div class="page-title">WINNER HORSES</div>
            <div class="page-subtitle">RACE WINNERS DATABASE — FACE FEATURE ARCHIVE</div>
        </div>

        <!-- 検索フォーム -->
        <form method="get" action="/horse" class="search-bar">
            <input type="text" name="q" th:value="${q}" placeholder="馬名で検索">
            <button type="submit" class="btn-search">検索</button>
        </form>

        <div class="count-line">
            <span class="count-val" th:text="${horses.size()}">0</span> 頭
        </div>

        <!-- 馬グリッド -->
        <div class="horse-grid" th:unless="${horses.isEmpty()}">
            <a th:each="h : ${horses}" th:href="'/horse/' + ${h.id}" class="horse-card">
                <img th:if="${h.imagePath != null}" th:src="${h.imagePath}" th:alt="${h.horseName}">
                <div th:unless="${h.imagePath != null}" class="no-img">NO IMAGE</div>
                <div class="horse-card-body">
                    <div class="horse-card-name" th:text="${h.horseName}">馬名</div>
                    <div class="horse-card-meta">
                        <span class="meta-category" th:text="${h.raceCategory}">種別</span>
                        <span class="win-badge" th:text="${h.winCount} + '勝'">1勝</span>
                    </div>
                </div>
            </a>
        </div>

        <div class="empty-state" th:if="${horses.isEmpty()}">
            <p>データがありません。</p>
        </div>
    </div>
</body>
</html>
