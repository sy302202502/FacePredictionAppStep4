<!-- templates/races/index.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>レース一覧</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <h1>レース一覧</h1>

    <!-- ナビゲーション -->
    <nav>
        <a th:href="@{/faces}">顔画像一覧</a> |
        <a th:href="@{/faces/upload}">顔画像アップロード</a> |
        <a th:href="@{/races}">レース一覧</a> |
        <a th:href="@{/races/new}">レース登録</a>
    </nav>

    <table>
        <tr>
            <th>ID</th>
            <th>レース名</th>
            <th>開催日</th>
        </tr>
        <tr th:each="race : ${races}">
            <td th:text="${race.id}">1</td>
            <td th:text="${race.raceName}">サンプルレース</td>
            <td th:text="${race.date}">2025-08-01</td>
        </tr>
    </table>
</body>
</html>
